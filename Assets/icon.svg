<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="35%" r="80%">
      <stop offset="0%" stop-color="#3a3835"/>
      <stop offset="100%" stop-color="#1e1d1b"/>
    </radialGradient>
    <linearGradient id="needle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8875f"/>
      <stop offset="100%" stop-color="#c96442"/>
    </linearGradient>
  </defs>

  <!-- squircle macOS -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bg)"/>

  <!-- arco externo sutil ligando os ticks -->
  <path d="M 243.3 780.7 A 380 380 0 1 1 780.7 780.7"
        fill="none" stroke="#f0eee6" stroke-opacity="0.15" stroke-width="12" stroke-linecap="round"/>

  <!-- ticks: raios estilo Claude, 12 sobre 270°; últimos 3 = zona vermelha em coral -->
  <g>
    <path transform="rotate(-135 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(-110.45 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(-85.9 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(-61.36 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(-36.8 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(-12.27 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(12.27 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(36.8 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(61.36 512 512)" fill="#f0eee6" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(85.9 512 512)" fill="#d97757" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(110.45 512 512)" fill="#d97757" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
    <path transform="rotate(135 512 512)" fill="#d97757" d="M 496 262 L 503 172 Q 512 150 521 172 L 528 262 Q 512 280 496 262 Z"/>
  </g>

  <!-- ponteiro em ~70% do curso, com contrapeso -->
  <g transform="rotate(54 512 512)">
    <polygon points="495,540 529,540 516,200 508,200" fill="url(#needle)"/>
    <rect x="496" y="512" width="32" height="88" rx="16" fill="url(#needle)"/>
  </g>

  <!-- cubo central -->
  <circle cx="512" cy="512" r="70" fill="#d97757"/>
  <circle cx="512" cy="512" r="28" fill="#1e1d1b"/>
</svg>
